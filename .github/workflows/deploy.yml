name: Deploy MCP Dolibarr

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Copy src to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "src/,package*.json,tsconfig.json,Dockerfile,docker-compose.yml"
          target: /opt/1panel/apps/mcp-dolibarr/

      - name: Rebuild Docker on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 15m
          script: |
            cd /opt/1panel/apps/mcp-dolibarr
            if docker compose build --no-cache 2>&1 | tee /tmp/build.log; then
              docker compose up -d
              echo "BUILD SUCCESS"
            else
              echo "BUILD FAILED - restarting last working image"
              cat /tmp/build.log | tail -20
              docker compose up -d --no-build || true
            fi
            sleep 8
            curl -s https://mcp.digitalfactory.sn/health || echo "Health check failed"
