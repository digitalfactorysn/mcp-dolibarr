# /etc/nginx/sites-available/mcp-dolibarr
# Reverse proxy HTTPS pour le serveur MCP Dolibarr
# Remplacez mcp.digitalfactory.sn par votre domaine
#
# Activer : sudo ln -s /etc/nginx/sites-available/mcp-dolibarr /etc/nginx/sites-enabled/
# Certificat : sudo certbot --nginx -d mcp.digitalfactory.sn

server {
    listen 80;
    server_name mcp.digitalfactory.sn;

    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mcp.digitalfactory.sn;

    # Certificat SSL (Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/mcp.digitalfactory.sn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.digitalfactory.sn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/mcp-dolibarr.access.log;
    error_log  /var/log/nginx/mcp-dolibarr.error.log;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers nécessaires pour SSE (Server-Sent Events)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        # Désactiver le buffering — CRITIQUE pour SSE
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        keepalive_timeout      3600s;

        # CORS géré par l'application Node.js
        # (ne pas ajouter de headers CORS ici pour éviter les doublons)
    }

    # Health check (accessible sans auth pour monitoring)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
    }
}
